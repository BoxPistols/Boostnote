name: Modern workspaces

# Type-checks/builds the modern app shell, runs its data-layer tests, and runs
# the collab-core PoC tests on Node 22. Separate from the legacy Electron app
# (Node 14, ci.yml). Path-filtered to app/** and poc/**. All run: steps are
# static commands (no untrusted event input). The app job skips the Electron
# binary download (not needed to type-check/build/test).

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'poc/**'
      - '.github/workflows/modern.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'poc/**'
      - '.github/workflows/modern.yml'
  workflow_dispatch:

jobs:
  app:
    name: app — type-check, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check & build
        run: npm run build
      - name: Data-layer tests
        run: npm test

  poc-collab-core:
    name: poc/collab-core — convergence test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poc/collab-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: poc/collab-core/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Headless collab convergence test
        run: npm test
